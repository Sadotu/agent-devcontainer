name: Publish devcontainer image

on:
  push:
    branches: [main]
    paths:
      - .devcontainer/**
      - .github/workflows/publish-image.yml
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ghcr.io image paths must be lowercase; github.repository_owner isn't
      # guaranteed to be.
      - name: Compute lowercase owner
        id: vars
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .devcontainer
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/agent-devcontainer:latest
            ghcr.io/${{ steps.vars.outputs.owner }}/agent-devcontainer:${{ github.sha }}
